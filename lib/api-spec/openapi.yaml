openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: Cerevia AI chat
paths:
  /chat:
    post:
      operationId: cereiviaChat
      tags: [ai]
      summary: Cerevia AI chat (SSE streaming)
      description: Streams an AI response given patient context and a user message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CereviaChatRequest"
      responses:
        "200":
          description: SSE stream of AI tokens
          content:
            text/event-stream:
              schema:
                type: string
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    CereviaChatRequest:
      type: object
      required: [message, role]
      properties:
        message:
          type: string
          description: The user's message
        role:
          type: string
          enum: [patient, gp]
        patientContext:
          type: object
          description: Serialised patient data injected into the system prompt
          properties:
            patientName:
              type: string
            events:
              type: array
              items:
                type: object
            medicationLogs:
              type: array
              items:
                type: object
            linkedPatientName:
              type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

