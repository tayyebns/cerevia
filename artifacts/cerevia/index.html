<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the persisted theme before first paint to prevent any flash of
      // the wrong theme (FOUC). Defaults to dark — a medical accommodation for
      // migraine photophobia. Keep the storage key in sync with next-themes.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored ? stored !== 'light' : true;
          var el = document.documentElement;
          el.classList.toggle('dark', isDark);
          el.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
