kind = "web"
previewPath = "/"
title = "Cerevia"
version = "1.0.0"
id = "artifacts/cerevia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26187

[services.development]
run = "pnpm --filter @workspace/cerevia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cerevia", "run", "build" ]
publicDir = "artifacts/cerevia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26187"
BASE_PATH = "/"
